  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // --- データ定義 ---

      { id: 27, name: "光る流れ星", emoji: "🌟", color: "bg-yellow-100" },
      { id: 28, name: "きらきら魔法", emoji: "✨", color: "bg-yellow-50" },
      { id: 29, name: "ぽかぽか太陽", emoji: "☀️", color: "bg-orange-50" },

    ];

    const FREQUENCIES = [
      { id: 'always', jp: 'いつもする日課', color: 'bg-red-50', headerColor: 'bg-red-500', borderColor: 'border-red-300' },
      { id: 'usually', jp: 'だいたいする日課', color: 'bg-orange-50', headerColor: 'bg-orange-500', borderColor: 'border-orange-300' },
      { id: 'sometimes', jp: 'ときどきする日課', color: 'bg-yellow-50', headerColor: 'bg-yellow-500', borderColor: 'border-yellow-300' },
      { id: 'never', jp: 'まったくやらない日課', color: 'bg-blue-50', headerColor: 'bg-blue-500', borderColor: 'border-blue-300' }
    ];

    const COMMON_ROUTINES = [
      { en: "get up", jp: "起きる" },
      { en: "eat breakfast", jp: "朝食を食べる" },
      { en: "go to school", jp: "学校に行く" },
      { en: "play with my friends", jp: "友だちと遊ぶ" },
      { en: "do my homework", jp: "宿題をする" },
      { en: "eat dinner", jp: "夕食を食べる" },
      { en: "take a bath", jp: "お風呂に入る" },
      { en: "go to bed", jp: "寝る" }
    ];

    const COMMON_TIMES = ["1:00", "2:00", "3:00", "4:00", "5:00", "6:00", "7:00", "8:00", "9:00", "10:00", "11:00", "12:00"];

    const QUIZ_LIST = [
      { jp: "起きる", en: "get up" },
      { jp: "朝食を食べる", en: "eat breakfast" },
      { jp: "学校に行く", en: "go to school" },
      { jp: "友だちと遊ぶ", en: "play with my friends" },
      { jp: "宿題をする", en: "do my homework" },
      { jp: "夕食を食べる", en: "eat dinner" },
      { jp: "お風呂に入る", en: "take a bath" },
      { jp: "寝る", en: "go to bed" },
      { jp: "テレビを見る", en: "watch TV" },
      { jp: "本を読む", en: "read a book" }
    ];

    // --- ミニゲームコンポーネント ---
    function MiniGame({ monsters, onFinish }) {
      const [timeLeft, setTimeLeft] = useState(10);
      const [coins, setCoins] = useState(0);
      
      const initialPositions = useMemo(() => {
        return monsters.map((m) => ({
          id: m.id,
          emoji: m.emoji,
          x: 50 + (Math.random() * 40 - 20),
          y: 50 + (Math.random() * 40 - 20)
        }));
      }, [monsters]);

      const [playerPositions, setPlayerPositions] = useState(initialPositions);
      const [coinPos, setCoinPos] = useState({x: Math.random() * 80 + 10, y: Math.random() * 80 + 10});
      
      const playersRef = useRef(initialPositions);
      const coinRef = useRef({x: coinPos.x, y: coinPos.y});
      const keysRef = useRef({ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false});
      const requestRef = useRef();
      const isFinished = useRef(false);

      useEffect(() => {
        const timer = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timer);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (timeLeft === 0 && !isFinished.current) {
          isFinished.current = true;
          cancelAnimationFrame(requestRef.current);
          onFinish(coins);
        }
      }, [timeLeft, coins, onFinish]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (keysRef.current.hasOwnProperty(e.key)) {
            keysRef.current[e.key] = true;
            e.preventDefault();
          }
        };
        const handleKeyUp = (e) => {
          if (keysRef.current.hasOwnProperty(e.key)) {
            keysRef.current[e.key] = false;
            e.preventDefault();
          }
        };
        window.addEventListener('keydown', handleKeyDown, {passive: false});
        window.addEventListener('keyup', handleKeyUp);
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('keyup', handleKeyUp);
        };
      }, []);

      useEffect(() => {
        const updateGame = () => {
          if (timeLeft <= 0) return;

          const speed = 1.2;
          let dx = 0;
          let dy = 0;

          if (keysRef.current.ArrowUp) dy -= speed;
          if (keysRef.current.ArrowDown) dy += speed;
          if (keysRef.current.ArrowLeft) dx -= speed;
          if (keysRef.current.ArrowRight) dx += speed;

          const newPositions = playersRef.current.map(p => {
            let px = p.x + dx;
            let py = p.y + dy;
            px = Math.max(5, Math.min(95, px));
            py = Math.max(5, Math.min(95, py));
            return { ...p, x: px, y: py };
          });

          playersRef.current = newPositions;
          setPlayerPositions(newPositions);

          const cx = coinRef.current.x;
          const cy = coinRef.current.y;
          const hit = newPositions.some(p => Math.hypot(p.x - cx, p.y - cy) < 10);
          
          if (hit) { 
            setCoins(c => c + 1);
            coinRef.current = {
              x: Math.random() * 80 + 10,
              y: Math.random() * 80 + 10
            };
            setCoinPos({...coinRef.current});
          }

          requestRef.current = requestAnimationFrame(updateGame);
        };
        requestRef.current = requestAnimationFrame(updateGame);
        return () => cancelAnimationFrame(requestRef.current);
      }, [timeLeft]);

      const handlePointer = (dir, isDown) => {
        keysRef.current[dir] = isDown;
      };

      return (
        <div className="min-h-screen bg-green-50 p-4 md:p-8 flex flex-col items-center justify-center">
          <div className="max-w-lg w-full bg-white rounded-3xl shadow-xl p-4 md:p-8 border-4 border-green-200">
            <h2 className="text-2xl font-bold text-center text-green-700 mb-4">コインをあつめよう！</h2>
            <div className="flex justify-between items-center mb-4 px-2">
              <div className="text-2xl font-bold text-gray-700">⏳ {timeLeft}びょう</div>
              <div className="text-2xl font-bold text-yellow-500">🪙 {coins} コイン</div>
            </div>
            
            <div className="relative w-full h-80 bg-green-100 rounded-xl overflow-hidden border-2 border-green-300">
              {playerPositions.map((p, index) => (
                <div 
                  key={p.id + '-' + index}
                  className="absolute text-5xl transform -translate-x-1/2 -translate-y-1/2 drop-shadow-md z-10"
                  style={{ left: `${p.x}%`, top: `${p.y}%` }}
                >
                  {p.emoji}
                </div>
              ))}
              <div 
                className="absolute text-3xl transform -translate-x-1/2 -translate-y-1/2 drop-shadow-md animate-bounce"
                style={{ left: `${coinPos.x}%`, top: `${coinPos.y}%` }}
              >
                🪙
              </div>
            </div>

            <div className="grid grid-cols-3 gap-2 w-48 mx-auto mt-6 touch-none">
              <div />
              <button 
                className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center"
                onPointerDown={() => handlePointer('ArrowUp', true)}
                onPointerUp={() => handlePointer('ArrowUp', false)}
                onPointerLeave={() => handlePointer('ArrowUp', false)}
              >⬆️</button>
              <div />
              <button 
                className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center"
                onPointerDown={() => handlePointer('ArrowLeft', true)}
                onPointerUp={() => handlePointer('ArrowLeft', false)}
                onPointerLeave={() => handlePointer('ArrowLeft', false)}
              >⬅️</button>
              <button 
                className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center"
                onPointerDown={() => handlePointer('ArrowDown', true)}
                onPointerUp={() => handlePointer('ArrowDown', false)}
                onPointerLeave={() => handlePointer('ArrowDown', false)}
              >⬇️</button>
              <button 
                className="bg-gray-200 active:bg-gray-400 p-4 rounded-xl text-2xl shadow select-none flex items-center justify-center"
                onPointerDown={() => handlePointer('ArrowRight', true)}
                onPointerUp={() => handlePointer('ArrowRight', false)}
                onPointerLeave={() => handlePointer('ArrowRight', false)}
              >➡️</button>
            </div>
            
            <p className="text-center text-gray-500 mt-4 text-sm font-bold">じゅうじキーでも うごかせるよ</p>
          </div>
        </div>
      );
    }

    // --- メインアプリ ---
    function App() {
      const [step, setStep] = useState('HOME'); 
      const [playCount, setPlayCount] = useState(0);
      const [collections, setCollections] = useState([]);
      const [totalCoins, setTotalCoins] = useState(0);
      
      const [freqIndex, setFreqIndex] = useState(0);
      const [sentences, setSentences] = useState([]);
      
      const [tempRoutineJp, setTempRoutineJp] = useState("");
      const [tempRoutineEn, setTempRoutineEn] = useState("");
      const [tempTime, setTempTime] = useState("");
      const [isTranslating, setIsTranslating] = useState(false);
      
      const [quizQuestions, setQuizQuestions] = useState([]);
      const [currentQuizIndex, setCurrentQuizIndex] = useState(0);
      
      const [failCount, setFailCount] = useState(0);
      const [isListening, setIsListening] = useState(false);
      const [isListeningDictation, setIsListeningDictation] = useState(false);
      const [recognitionText, setRecognitionText] = useState("");
      const [feedbackMsg, setFeedbackMsg] = useState("");
      
      const [currentGachaMonster, setCurrentGachaMonster] = useState(null);
      const [isRolling, setIsRolling] = useState(false);
      const [rollEmoji, setRollEmoji] = useState("🎁");
      const [lastEarnedCoins, setLastEarnedCoins] = useState(0);

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const synth = window.speechSynthesis;

      useEffect(() => {
        const savedCount = localStorage.getItem('englishRoutinePlayCount');
        if (savedCount) setPlayCount(parseInt(savedCount, 10));
        const savedCollections = localStorage.getItem('englishRoutineCollections');
        if (savedCollections) setCollections(JSON.parse(savedCollections));
        const savedCoins = localStorage.getItem('englishRoutineCoins');
        if (savedCoins) setTotalCoins(parseInt(savedCoins, 10));
      }, []);

      const saveData = (newCount, newCollections, newCoins) => {
        localStorage.setItem('englishRoutinePlayCount', newCount.toString());
        localStorage.setItem('englishRoutineCollections', JSON.stringify(newCollections));
        localStorage.setItem('englishRoutineCoins', newCoins.toString());
        setPlayCount(newCount);
        setCollections(newCollections);
        setTotalCoins(newCoins);
      };

      const speak = useCallback((text, rate = 0.9) => {
        if (synth.speaking) synth.cancel();
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'en-US';
        utterThis.rate = rate; 
        const voices = synth.getVoices();
        const englishVoice = voices.find(v => v.lang.includes('en-US') && v.name.includes('Female')) || voices.find(v => v.lang.includes('en-US'));
        if (englishVoice) utterThis.voice = englishVoice;
        synth.speak(utterThis);
      }, [synth]);

      // 日本語の自由入力用の音声認識
      const startDictation = (target) => {
        if (!SpeechRecognition) {
          alert("お使いのブラウザは音声入力に対応していません。テキストで入力してください。");
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        setIsListeningDictation(true);

        recognition.onresult = (event) => {
          let transcript = event.results[0][0].transcript;
          if (target === 'routine') {
            setTempRoutineJp(transcript);
          } else if (target === 'time') {
            // 例：5時 → 5:00, 15時半 → 3:30, 15時45分 → 3:45
            let timeStr = transcript.replace(/時半/g, ':30').replace(/時/g, ':').replace(/分/g, '').trim();
            if (timeStr.endsWith(':')) {
              timeStr += '00';
            } else if (!timeStr.includes(':')) {
              timeStr += ':00';
            }
            
            // 13〜24時を1〜12時に変換
            const match = timeStr.match(/^([0-9]+)(:[0-9]+)?$/);
            if (match) {
              let hour = parseInt(match[1], 10);
              let min = match[2] || ':00';
              if (hour > 12) hour -= 12;
              if (hour === 0) hour = 12;
              timeStr = hour + min;
            }
            setTempTime(timeStr);
          }
        };
        recognition.onerror = () => {
          alert("うまくききとれませんでした。もういちどおしてね。");
          setIsListeningDictation(false);
        };
        recognition.onend = () => {
          setIsListeningDictation(false);
        };
        recognition.start();
      };

      // 翻訳API
      const handleTranslate = async () => {
        if (!tempRoutineJp.trim()) return;
        setIsTranslating(true);
        try {
          const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(tempRoutineJp)}&langpair=ja|en`);
          const data = await res.json();
          let eng = data.responseData.translatedText;
          if (eng) {
            // 余分な主語やピリオドを取り除く
            eng = eng.toLowerCase().replace(/\./g, '').replace(/^i\s+/, '').replace(/^my\s+/, '').trim();
            setTempRoutineEn(eng);
          }
        } catch (error) {
          console.error("Translation error:", error);
          alert("ほんやくにしっぱいしました。");
        }
        setIsTranslating(false);
      };

      const prepareQuiz = () => {
        const shuffled = [...QUIZ_LIST].sort(() => 0.5 - Math.random());
        setQuizQuestions(shuffled.slice(0, 4));
        setCurrentQuizIndex(0);
        setStep('QUIZ_INTRO');
      };

      // 英語の発音判定用の音声認識
      const startListening = (targetType) => {
        if (!SpeechRecognition) {
          alert("お使いのブラウザは音声入力に対応していません。スキップして進んでください。");
          setFailCount(5); 
          return;
        }
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        setIsListening(true);
        setRecognitionText("きいています...");
        setFeedbackMsg("");

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.toLowerCase();
          setRecognitionText(transcript);
          checkPronunciation(transcript, targetType);
        };
        recognition.onerror = () => {
          setIsListening(false);
          setRecognitionText("うまくききとれませんでした。もういちどボタンをおしてね。");
          setFailCount(prev => prev + 1);
        };
        recognition.onend = () => setIsListening(false);
        recognition.start();
      };

      const checkPronunciation = (transcript, targetType) => {
        let isCorrect = false;
        
        if (targetType === 'SPEAK_SENTENCE') {
          const freq = FREQUENCIES[freqIndex].id; 
          const routine = tempRoutineEn.toLowerCase();
          const routineWords = routine.split(' ').filter(w => w.length > 2);
          const keyword = routineWords.length > 0 ? routineWords[0] : routine;
          
          if (transcript.includes(freq) && transcript.includes(keyword)) {
            isCorrect = true;
          }
        } 
        else if (targetType === 'QUIZ') {
          const answer = quizQuestions[currentQuizIndex].en.toLowerCase();
          const answerWords = answer.split(' ').filter(w => w.length > 2);
          const keyword = answerWords.length > 0 ? answerWords[0] : answer;
          
          if (transcript.includes(keyword)) {
            isCorrect = true;
          }
        }

        if (isCorrect) {
          setFeedbackMsg("Excellent! 👏");
          setTimeout(() => speak("Excellent!"), 500);
          setTimeout(() => proceedToNext(targetType), 2000);
        } else {
          setFeedbackMsg("おしい！もういちどチャレンジ！");
          setFailCount(prev => prev + 1);
        }
      };

      const proceedToNext = (fromType) => {
        setFailCount(0);
        setRecognitionText("");
        setFeedbackMsg("");
        
        if (fromType === 'SPEAK_SENTENCE') {
          if (freqIndex + 1 < FREQUENCIES.length) {
            setFreqIndex(prev => prev + 1);
            setTempRoutineJp("");
            setTempRoutineEn("");
            setTempTime("");
            setStep('CREATE_SENTENCE');
          } else {
            setStep('NOTEBOOK');
          }
        }
        else if (fromType === 'QUIZ') {
          if (currentQuizIndex + 1 < 4) {
            setCurrentQuizIndex(prev => prev + 1);
          } else {
            setStep('GACHA');
          }
        }
      };

      const rollGacha = () => {
        setIsRolling(true);
        const intervalId = setInterval(() => {
          setRollEmoji(MONSTERS[Math.floor(Math.random() * MONSTERS.length)].emoji);
        }, 100);

        const ownedIds = collections.map(c => c.id);
        const unowned = MONSTERS.filter(m => !ownedIds.includes(m.id));
        const newMonster = unowned.length > 0 ? unowned[Math.floor(Math.random() * unowned.length)] : MONSTERS[Math.floor(Math.random() * MONSTERS.length)];

        setTimeout(() => {
          clearInterval(intervalId);
          setIsRolling(false);
          setCurrentGachaMonster(newMonster);
          if (!ownedIds.includes(newMonster.id)) {
            saveData(playCount + 1, [...collections, newMonster], totalCoins);
          } else {
            saveData(playCount + 1, collections, totalCoins);
          }
        }, 2500);
      };

      // --- 画面レンダリング ---

      if (step === 'HOME') {
        return (
          <div className="min-h-screen p-4 md:p-8 flex flex-col justify-center relative bg-blue-50">
            <div className="absolute top-4 right-4 bg-yellow-400 text-yellow-900 font-bold px-6 py-2 rounded-full border-4 border-yellow-200 shadow-lg text-xl z-50">
              🪙 {totalCoins}
            </div>
            <div className="max-w-2xl w-full mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-200">
              <div className="bg-gradient-to-r from-blue-400 to-indigo-500 p-8 text-center text-white">
                <h1 className="text-3xl md:text-4xl font-extrabold mb-4 drop-shadow-md">えいごで はなそう！</h1>
                <p className="text-lg bg-white/20 inline-block px-4 py-2 rounded-full font-medium">🎧 イヤホンを つけましょう 🎧</p>
              </div>
              <div className="p-8 text-center">
                <button 
                  onClick={() => { 
                    setSentences([]); 
                    setFreqIndex(0);
                    setTempRoutineJp(""); setTempRoutineEn(""); setTempTime("");
                    setStep('GREETING'); 
                    setTimeout(() => speak("Please tell me about your day."), 500); 
                  }}
                  className="bg-red-500 hover:bg-red-600 text-white text-2xl font-bold py-4 px-12 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 mx-auto mb-8 flex items-center"
                >
                  <span className="mr-2 text-2xl">▶️</span> スタート！
                </button>

                <div className="bg-yellow-50 rounded-2xl p-6 border-2 border-yellow-200">
                  <h2 className="text-xl font-bold text-yellow-700 mb-4">⭐ あつめたモンスター ({collections.length}/30)</h2>
                  <div className="grid grid-cols-5 gap-2 md:gap-4">
                    {collections.map(m => (
                      <div key={m.id} className={`${m.color} p-2 rounded-xl text-center shadow-sm text-2xl relative group cursor-default`} title={m.name}>
                        {m.emoji}
                        <div className="absolute hidden group-hover:block bg-black text-white text-xs p-1 rounded -top-8 left-1/2 transform -translate-x-1/2 whitespace-nowrap z-10">{m.name}</div>
                      </div>
                    ))}
                    {Array.from({ length: 30 - collections.length }).map((_, i) => (
                      <div key={`empty-${i}`} className="bg-gray-100 p-2 rounded-xl text-center border-2 border-dashed border-gray-300 text-2xl opacity-50">❓</div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (step === 'GREETING') {
        return (
          <div className="min-h-screen bg-green-50 p-4 flex items-center justify-center">
            <div className="max-w-lg w-full bg-white rounded-3xl shadow-xl p-8 border-4 border-green-200 text-center">
              <div className="bg-green-500 text-white p-4 rounded-xl flex items-center justify-center font-bold text-xl mb-6 shadow-md">
                コンピューターからの しつもん
              </div>
              <div className="mb-8">
                <button onClick={() => speak("Please tell me about your day.")} className="bg-blue-100 p-4 rounded-full text-blue-600 hover:bg-blue-200 mx-auto mb-4 text-4xl">🔊</button>
                <p className="text-2xl font-bold text-gray-700 leading-relaxed">"Please tell me about your day."</p>
                <p className="text-gray-500 mt-4 font-bold">（あなたの一日の日課を おしえてください。）</p>
              </div>
              <button onClick={() => setStep('CREATE_SENTENCE')} className="w-full bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-4 rounded-xl shadow-md">つぎへ</button>
            </div>
          </div>
        );
      }

      if (step === 'CREATE_SENTENCE') {
        const currentFreq = FREQUENCIES[freqIndex];
        return (
          <div className={`min-h-screen ${currentFreq.color} p-4 flex flex-col items-center justify-center py-10`}>
            <div className={`max-w-lg w-full bg-white rounded-3xl shadow-xl p-6 border-4 ${currentFreq.borderColor}`}>
              <div className={`${currentFreq.headerColor} text-white p-4 rounded-xl flex items-center justify-center font-bold text-xl mb-6 shadow-md`}>
                {currentFreq.jp} をつくろう
              </div>
              
              {/* 日課えらぶ */}
              <div className="mb-6">
                <p className="text-lg font-bold mb-3 text-gray-800">① なにをする？ <span className="text-sm font-normal text-gray-500">（えらぶか、にほんごをいれる）</span></p>
                <div className="grid grid-cols-2 gap-2 mb-3">
                  {COMMON_ROUTINES.map(r => (
                    <button 
                      key={r.en}
                      onClick={() => { setTempRoutineEn(r.en); setTempRoutineJp(r.jp); }}
                      className={`p-3 rounded-lg border-2 ${tempRoutineEn === r.en ? 'bg-indigo-500 text-white border-indigo-600 shadow-inner' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'} text-sm font-bold transition`}
                    >
                      {r.jp}<br/><span className={`text-xs opacity-80 font-normal ${tempRoutineEn === r.en ? 'text-indigo-200' : 'text-gray-500'}`}>{r.en}</span>
                    </button>
                  ))}
                </div>
                <div className="bg-gray-50 border border-gray-200 p-4 rounded-xl">
                  <p className="font-bold text-gray-600 text-sm mb-2">じぶんで にほんごをいれて、えいごにする：</p>
                  <div className="flex gap-2">
                    <input 
                      type="text" value={tempRoutineJp} onChange={e => setTempRoutineJp(e.target.value)}
                      className="border-2 border-gray-300 rounded-lg p-2 flex-1 font-bold text-gray-700 focus:border-indigo-500 focus:outline-none" 
                      placeholder="例：ピアノをひく"
                    />
                    <button 
                      onClick={() => startDictation('routine')} 
                      className={`p-2 rounded-full px-4 text-white font-bold shadow-md ${isListeningDictation ? 'bg-red-500 animate-pulse' : 'bg-blue-500 hover:bg-blue-600'}`}
                      title="マイクで音声入力"
                    >
                      🎤
                    </button>
                  </div>
                  <button 
                    onClick={handleTranslate} 
                    disabled={!tempRoutineJp || isTranslating} 
                    className="w-full mt-3 bg-purple-500 hover:bg-purple-600 disabled:bg-gray-400 text-white font-bold py-2 rounded-lg shadow-sm transition"
                  >
                    {isTranslating ? "ほんやく中..." : "えいごに ほんやく！"}
                  </button>
                </div>
              </div>

              {/* 時刻えらぶ */}
              <div className="mb-6">
                <p className="text-lg font-bold mb-3 text-gray-800">② いつする？ <span className="text-sm font-normal text-gray-500">（えらぶか、じこくをいれる）</span></p>
                <div className="flex flex-wrap gap-2 mb-3">
                  {COMMON_TIMES.map(t => (
                    <button 
                      key={t}
                      onClick={() => setTempTime(t)}
                      className={`px-4 py-2 rounded-lg border-2 font-bold transition ${tempTime === t ? 'bg-indigo-500 text-white border-indigo-600 shadow-inner' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'}`}
                    >
                      {t}
                    </button>
                  ))}
                </div>
                <div className="bg-gray-50 border border-gray-200 p-4 rounded-xl">
                  <p className="font-bold text-gray-600 text-sm mb-2">じぶんで じこくを いれる：</p>
                  <div className="flex gap-2">
                    <input 
                      type="text" value={tempTime} onChange={e => setTempTime(e.target.value)}
                      className="border-2 border-gray-300 rounded-lg p-2 flex-1 font-bold text-gray-700 focus:border-indigo-500 focus:outline-none" 
                      placeholder="例：18:30"
                    />
                    <button 
                      onClick={() => startDictation('time')} 
                      className={`p-2 rounded-full px-4 text-white font-bold shadow-md ${isListeningDictation ? 'bg-red-500 animate-pulse' : 'bg-blue-500 hover:bg-blue-600'}`}
                      title="マイクで音声入力"
                    >
                      🎤
                    </button>
                  </div>
                </div>
              </div>

              {/* プレビュー */}
              <div className="bg-blue-100 p-4 rounded-xl mb-6 font-mono text-xl text-center font-bold text-gray-800 shadow-inner border border-blue-200">
                I {currentFreq.id} <span className="text-blue-700">{tempRoutineEn || "___"}</span> at <span className="text-orange-700">{tempTime || "___"}</span>.
              </div>

              <button 
                disabled={!tempRoutineEn || !tempTime} 
                onClick={() => {
                  const newSentences = [...sentences];
                  newSentences[freqIndex] = { freq: currentFreq.id, routine: tempRoutineEn, time: tempTime };
                  setSentences(newSentences);
                  setStep('SPEAK_SENTENCE');
                  setFailCount(0);
                }}
                className={`w-full py-4 rounded-xl text-xl font-bold text-white shadow-lg transition ${(!tempRoutineEn || !tempTime) ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-500 hover:bg-green-600 active:scale-95'}`}
              >
                この文をいう！
              </button>
            </div>
          </div>
        );
      }

      if (step === 'SPEAK_SENTENCE') {
        const currentFreq = FREQUENCIES[freqIndex];
        const sentence = `I ${currentFreq.id} ${sentences[freqIndex]?.routine} at ${sentences[freqIndex]?.time}.`;
        
        return (
          <div className={`min-h-screen ${currentFreq.color} p-4 flex items-center justify-center`}>
            <div className={`max-w-lg w-full bg-white rounded-3xl shadow-xl p-8 border-4 ${currentFreq.borderColor} text-center`}>
              <div className={`${currentFreq.headerColor} text-white p-4 rounded-xl flex items-center justify-center font-bold text-xl mb-6 shadow-md`}>
                えいごで いってみよう！
              </div>
              <div className={`${currentFreq.color} p-6 rounded-2xl mb-8 border border-white/50 shadow-inner`}>
                <p className="text-3xl font-bold text-gray-800 mb-4 leading-relaxed">
                  I {currentFreq.id} <span className="text-blue-700">{sentences[freqIndex]?.routine}</span> at <span className="text-orange-700">{sentences[freqIndex]?.time}</span>.
                </p>
                <button onClick={() => speak(sentence)} className="mx-auto text-gray-700 bg-white px-6 py-3 rounded-full shadow hover:bg-gray-50 flex items-center font-bold transition">
                  <span className="mr-2 text-2xl">🔊</span>おてほんをきく
                </button>
              </div>
              <div className="mb-8">
                <button onClick={() => startListening('SPEAK_SENTENCE')} disabled={isListening} className={`p-6 rounded-full shadow-lg ${isListening ? 'bg-red-500 animate-pulse' : 'bg-blue-500 hover:bg-blue-600'} text-white mx-auto text-4xl transition active:scale-95`}>🎤</button>
                <p className="mt-4 text-gray-600 font-bold">{isListening ? "はなしてください..." : "マイクをおして はなす"}</p>
                {recognitionText && <div className="mt-4 p-4 bg-gray-100 rounded-xl text-lg text-gray-700 italic border border-gray-200">"{recognitionText}"</div>}
                {feedbackMsg && <div className={`mt-4 text-2xl font-bold ${feedbackMsg.includes('Excellent') ? 'text-green-500' : 'text-orange-500'}`}>{feedbackMsg}</div>}
              </div>
              
              <div className="flex flex-col gap-4 mt-4">
                <button onClick={() => setStep('CREATE_SENTENCE')} className="text-gray-500 underline text-sm py-2 hover:text-gray-700">やりなおす（文をつくりなおす）</button>
                {failCount >= 5 && <button onClick={() => proceedToNext('SPEAK_SENTENCE')} className="bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 px-6 rounded-xl font-bold mx-auto transition">⏭️ スキップしてつぎへ</button>}
              </div>
            </div>
          </div>
        );
      }

      if (step === 'NOTEBOOK') {
        return (
          <div className="min-h-screen bg-yellow-50 p-4 flex items-center justify-center py-10">
            <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-6 md:p-10 border-4 border-yellow-200">
              <div className="flex items-center justify-center text-yellow-600 mb-8">
                <span className="mr-4 text-4xl">📖</span><h2 className="text-2xl md:text-3xl font-bold">ワークシートに かきましょう</h2>
              </div>
              <div className="bg-white border-2 border-gray-300 p-6 md:p-8 rounded-lg shadow-inner mb-8 bg-[url('https://www.transparenttextures.com/patterns/lined-paper-2.png')]">
                <p className="text-gray-600 mb-6 font-bold text-lg">あとで はっぴょうするので、じぶんの つくった文を ワークシートに うつしてね。</p>
                <div className="text-lg md:text-xl font-mono text-gray-800 leading-loose">
                  {sentences.map((s, i) => (
                    <div key={i} className="mb-4 border-b-2 border-dashed border-gray-400 pb-2">
                      I <span className="font-bold text-red-700 bg-red-100 px-2 py-1 rounded mx-1 shadow-sm">{s.freq}</span> 
                      <span className="font-bold text-blue-700 bg-blue-100 px-2 py-1 rounded mx-1 shadow-sm">{s.routine}</span> 
                      at <span className="font-bold text-orange-700 bg-orange-100 px-2 py-1 rounded mx-1 shadow-sm">{s.time}</span>.
                    </div>
                  ))}
                </div>
              </div>
              <div className="bg-red-50 p-6 rounded-xl border border-red-200 text-center mb-8">
                <p className="text-red-700 font-bold text-lg mb-2">ワークシートが かけたら、下のボタンを おしてね！</p>
              </div>
              <button onClick={() => setStep('NOTEBOOK_STAMP')} className="w-full bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-5 rounded-xl flex items-center justify-center shadow-lg transition active:scale-95"><span className="mr-3 text-3xl">📝</span> ワークシートが かけた！</button>
            </div>
          </div>
        );
      }

      if (step === 'NOTEBOOK_STAMP') {
        return (
          <div className="min-h-screen bg-yellow-50 p-4 flex items-center justify-center py-10">
            <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl p-6 md:p-10 border-4 border-yellow-200">
              <div className="flex items-center justify-center text-yellow-600 mb-8">
                <span className="mr-4 text-4xl">📖</span><h2 className="text-2xl md:text-3xl font-bold">ワークシートに かきましょう</h2>
              </div>
              <div className="bg-white border-2 border-gray-300 p-6 md:p-8 rounded-lg shadow-inner mb-8 bg-[url('https://www.transparenttextures.com/patterns/lined-paper-2.png')]">
                <p className="text-gray-600 mb-6 font-bold text-lg">あとで はっぴょうするので、じぶんの つくった文を ワークシートに うつしてね。</p>
                <div className="text-lg md:text-xl font-mono text-gray-800 leading-loose">
                  {sentences.map((s, i) => (
                    <div key={i} className="mb-4 border-b-2 border-dashed border-gray-400 pb-2">
                      I <span className="font-bold text-red-700 bg-red-100 px-2 py-1 rounded mx-1 shadow-sm">{s.freq}</span> 
                      <span className="font-bold text-blue-700 bg-blue-100 px-2 py-1 rounded mx-1 shadow-sm">{s.routine}</span> 
                      at <span className="font-bold text-orange-700 bg-orange-100 px-2 py-1 rounded mx-1 shadow-sm">{s.time}</span>.
                    </div>
                  ))}
                </div>
              </div>
              <div className="bg-red-50 p-6 rounded-xl border border-red-200 text-center mb-8">
                <p className="text-red-700 font-bold text-lg mb-2">先生を よんで スタンプを もらいましょう！</p>
                <p className="text-gray-600 font-bold">スタンプを もらったら、下のボタンを おしてね。</p>
              </div>
              <button onClick={prepareQuiz} className="w-full bg-yellow-500 hover:bg-yellow-600 text-white text-2xl font-bold py-5 rounded-xl flex items-center justify-center shadow-lg transition active:scale-95"><span className="mr-3 text-3xl">💮</span> スタンプをもらった！</button>
            </div>
          </div>
        );
      }

      if (step === 'QUIZ_INTRO') {
        return (
          <div className="min-h-screen bg-indigo-50 p-4 flex items-center justify-center">
            <div className="max-w-lg w-full bg-white rounded-3xl shadow-xl p-10 text-center border-4 border-indigo-200">
              <h2 className="text-3xl font-extrabold text-indigo-600 mb-8">えいかいわ おつかれさま！</h2>
              <div className="text-7xl mb-8 animate-bounce">📝</div>
              <p className="text-xl font-bold text-gray-700 mb-10 leading-relaxed">ここからは「日課」を えいごで こたえる<br/>クイズだよ！<br/>ぜんぶで ４もん あるよ。</p>
              <button onClick={() => setStep('QUIZ')} className="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-5 px-16 rounded-full text-2xl shadow-lg transition active:scale-95">スタート！</button>
            </div>
          </div>
        );
      }

      if (step === 'QUIZ') {
        const currentQ = quizQuestions[currentQuizIndex];
        return (
          <div className="min-h-screen bg-indigo-50 p-4 flex items-center justify-center">
            <div className="max-w-lg w-full bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-indigo-200">
              <div className="bg-indigo-500 text-white p-4 rounded-xl flex items-center justify-center font-extrabold text-2xl mb-8 shadow-md">
                クイズ {currentQuizIndex + 1} / 4
              </div>
              <div className="bg-indigo-100 p-8 rounded-2xl mb-10 shadow-inner border border-indigo-200">
                <p className="text-5xl font-extrabold text-indigo-700 mb-6 leading-tight">{currentQ.jp}</p>
                <p className="text-gray-600 font-bold text-xl">えいごで なにかな？</p>
                <button onClick={() => speak(currentQ.en)} className="mt-8 bg-white px-6 py-3 rounded-full shadow hover:bg-gray-50 text-indigo-600 font-bold flex mx-auto items-center transition">
                  <span className="mr-2 text-xl">🔊</span>こたえをきく (ヒント)
                </button>
              </div>
              <div className="mb-8">
                <button onClick={() => startListening('QUIZ')} disabled={isListening} className={`p-6 rounded-full shadow-lg ${isListening ? 'bg-red-500 animate-pulse' : 'bg-blue-500 hover:bg-blue-600'} text-white mx-auto text-4xl transition active:scale-95`}>🎤</button>
                <p className="mt-4 text-gray-600 font-bold">{isListening ? "はなしてください..." : "マイクをおして はなす"}</p>
                {recognitionText && <div className="mt-4 p-4 bg-gray-100 rounded-xl text-lg italic border border-gray-200">"{recognitionText}"</div>}
                {feedbackMsg && <div className={`mt-4 text-2xl font-bold ${feedbackMsg.includes('Excellent') ? 'text-green-500' : 'text-orange-500'}`}>{feedbackMsg}</div>}
              </div>
              {failCount >= 5 && <button onClick={() => proceedToNext('QUIZ')} className="bg-gray-200 hover:bg-gray-300 text-gray-700 py-3 px-6 rounded-xl font-bold mx-auto transition">⏭️ スキップしてつぎへ</button>}
            </div>
          </div>
        );
      }

      if (step === 'GACHA') {
        return (
          <div className="min-h-screen bg-indigo-900 p-4 flex items-center justify-center relative overflow-hidden">
            <div className="absolute inset-0 opacity-50 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-indigo-700 via-indigo-900 to-black"></div>
            <div className="max-w-lg w-full bg-white/10 backdrop-blur-md rounded-3xl shadow-2xl p-8 text-center relative z-10 border border-white/20">
              <h2 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500 mb-8">おたのしみ ガチャ！</h2>
              {!currentGachaMonster ? (
                <div className="mb-12">
                  {isRolling ? (
                    <div className="flex flex-col items-center justify-center">
                      <p className="text-yellow-300 font-bold text-2xl mb-8 animate-pulse">なにがでるかな...？</p>
                      <div className="w-48 h-48 mx-auto bg-white rounded-full flex items-center justify-center mb-8 border-4 border-yellow-300 scale-110 shadow-xl">
                        <span className="text-8xl">{rollEmoji}</span>
                      </div>
                    </div>
                  ) : (
                    <>
                      <div className="w-48 h-48 mx-auto bg-gradient-to-br from-purple-500 to-pink-500 rounded-full flex items-center justify-center animate-bounce mb-8 shadow-xl">
                        <span className="text-7xl">🎁</span>
                      </div>
                      <button onClick={rollGacha} className="bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-300 hover:to-orange-400 text-white text-3xl font-black py-5 px-12 rounded-full border-4 border-yellow-200 shadow-2xl transition active:scale-95">ガチャを まわす！</button>
                    </>
                  )}
                </div>
              ) : (
                <div className="mb-8 animate-fade-in-up">
                  <p className="text-yellow-300 font-bold text-xl mb-4">ゲットした モンスターは…</p>
                  <div className={`${currentGachaMonster.color} w-64 h-64 mx-auto rounded-full flex items-center justify-center mb-6 border-8 border-white shadow-2xl`}>
                    <span className="text-8xl mb-2">{currentGachaMonster.emoji}</span>
                  </div>
                  <h3 className="text-4xl font-extrabold text-white mb-8">{currentGachaMonster.name}</h3>
                  <button onClick={() => setStep('MINIGAME')} className="bg-yellow-500 hover:bg-yellow-600 text-white text-2xl font-bold py-5 px-8 rounded-full shadow-lg w-full transition active:scale-95">コインあつめゲームへ！</button>
                </div>
              )}
            </div>
          </div>
        );
      }

      if (step === 'MINIGAME') {
        const gameMonsters = collections.length > 0 ? collections : (currentGachaMonster ? [currentGachaMonster] : []);
        return <MiniGame monsters={gameMonsters} onFinish={(coins) => {
          setLastEarnedCoins(coins);
          const newTotal = totalCoins + coins;
          saveData(playCount, collections, newTotal);
          setStep('RESULT');
        }} />;
      }

      if (step === 'RESULT') {
        return (
          <div className="min-h-screen bg-yellow-50 p-4 flex items-center justify-center">
            <div className="max-w-lg w-full bg-white rounded-3xl shadow-xl p-10 border-4 border-yellow-200 text-center animate-fade-in-up">
              <h2 className="text-3xl font-extrabold text-yellow-600 mb-8">ゲーム おつかれさま！</h2>
              <div className="text-7xl mb-8">🎉</div>
              <p className="text-2xl font-bold text-gray-700 mb-6">あつめたコイン: <span className="text-yellow-500 text-5xl ml-2">{lastEarnedCoins}</span></p>
              <p className="text-xl font-bold text-gray-500 mb-10">ぜんぶで <span className="text-gray-800 text-2xl">{totalCoins}</span> コインになったよ！</p>
              
              <button onClick={() => { setCurrentGachaMonster(null); setStep('HOME'); }} className="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-5 px-10 rounded-full flex items-center justify-center mx-auto shadow-lg transition active:scale-95">
                <span className="mr-3 text-2xl">🏠</span> さいしょに もどる
              </button>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
